name: Staticcheck

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: "Run CI"
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v6
      with:
        go-version: 1.26.x
    - name: Run staticcheck
      uses: dominikh/staticcheck-action@v1.4.1
      with:
        version: "latest"
        install-go: false
